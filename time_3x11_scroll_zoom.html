<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>IKL – 3×11 Interaktions‑Raster</title>

<style>
  body { font-family: Arial; margin: 20px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(11, 80px);
    grid-template-rows: repeat(3, 60px);
    gap: 6px;
    width: max-content;
  }
  .cell {
    border: 1px solid #444;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fafafa;
    font-size: 14px;
  }
</style>
</head>

<body>

<h1>IKL – 3×11 Interaktions‑Raster</h1>
<p>Dieses Raster zeigt die Inter‑Kations‑Linie in einer 3×11‑Struktur.</p>

<div class="grid" id="grid"></div>

<script>
// ------------------------------------------------------
// IKL – 3×11 Mapping
// ------------------------------------------------------

const IKL_MAP = [
  { pos:[1,1], ref:"dir" },
  { pos:[1,2], ref:"mir" },
  { pos:[1,3], ref:"doch" },
  { pos:[1,4], ref:"egal" },
  { pos:[1,5], ref:"mov" },
  { pos:[1,6], ref:"nodi" },
  { pos:[1,7], ref:"use" },
  { pos:[1,8], ref:"target" },
  { pos:[1,9], ref:"user" },
  { pos:[1,10], ref:"move" },
  { pos:[1,11], ref:"REAL" },

  { pos:[2,1], ref:"dir" },
  { pos:[2,11], ref:"nir" },

  { pos:[3,1], ref:"user" },
  { pos:[3,11], ref:"REAL" }
];

function renderIKL(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(let r=1; r<=3; r++){
    for(let c=1; c<=11; c++){
      const cell = document.createElement("div");
      cell.className = "cell";

      const hit = IKL_MAP.find(s => s.pos[0] === r && s.pos[1] === c);
      cell.textContent = hit ? hit.ref : "";

      grid.appendChild(cell);
    }
  }
}

renderIKL();
</script>

</body>
</html>
